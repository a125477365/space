<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空间站实时追踪 · LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#02060f;
  --panel:rgba(8,16,32,.78);
  --panel-2:rgba(14,24,44,.82);
  --line:rgba(120,180,235,.16);
  --line-strong:rgba(140,200,255,.32);
  --text:#eaf3ff;
  --dim:#9bb0d4;
  --iss:#7fd8ff;   /* ISS 海洋蓝青 */
  --tg:#ffb24a;    /* 天宫 太阳橙 */
  --live:#57f7a8;
  --warn:#ffd166;
  --land:#3a6b8a;  /* 真实地球配色:海陆适配 */
  --num:'Rajdhani',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --sans:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#01030a;
  color:var(--text);
  font-family:var(--sans);
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;
}
/* 竖屏 9:16 舞台:手机上占满,宽屏(OBS/桌面)下按高度居中裁成 9:16 */
#stage{
  width:min(100vw,calc(100dvh * 9 / 16));
  height:100dvh;
  container-type:size;
  position:relative;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* 星空底 */
#stage::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.7),transparent 100%),
    radial-gradient(1px 1px at 68% 6%,rgba(255,255,255,.5),transparent 100%),
    radial-gradient(1.5px 1.5px at 84% 32%,rgba(180,210,255,.6),transparent 100%),
    radial-gradient(1px 1px at 30% 44%,rgba(255,255,255,.4),transparent 100%),
    radial-gradient(1px 1px at 55% 71%,rgba(255,255,255,.45),transparent 100%),
    radial-gradient(1.5px 1.5px at 8% 82%,rgba(180,210,255,.5),transparent 100%),
    radial-gradient(1px 1px at 91% 88%,rgba(255,255,255,.5),transparent 100%),
    radial-gradient(1px 1px at 42% 92%,rgba(255,255,255,.35),transparent 100%);
}
#stage>*{position:relative;z-index:1}

/* ── 顶栏 ─────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.6cqh 3.4cqw 1.2cqh;
  border-bottom:1px solid var(--line);
  flex:0 0 auto;
}
.brand{display:flex;align-items:center;gap:2.4cqw}
.live-dot{
  width:2.6cqw;height:2.6cqw;border-radius:50%;
  background:var(--live);box-shadow:0 0 2cqw var(--live);
  animation:blink 1.6s ease-in-out infinite;
}
@keyframes blink{50%{opacity:.25}}
h1{font-size:4.4cqw;font-weight:700;letter-spacing:.14em}
h1 small{
  display:block;font-family:var(--num);font-weight:600;font-size:2.5cqw;
  letter-spacing:.34em;color:var(--dim);margin-top:.3cqh;
}
.clocks{text-align:right;font-family:var(--num);line-height:1.25}
.clocks b{font-size:3.6cqw;font-weight:700;font-variant-numeric:tabular-nums}
.clocks span{font-size:2.4cqw;color:var(--dim);letter-spacing:.12em;margin-right:1.2cqw}

/* ── 地图 ─────────────────────────── */
#mapWrap{
  position:relative;flex:0 0 auto;
  height:50cqw; /* 等距圆柱 2:1 */
  border-bottom:1px solid var(--line);
  background:#040a1c;
}
#map{position:absolute;inset:0;width:100%;height:100%;display:block}
.map-hud{
  position:absolute;top:1.4cqw;right:1.6cqw;
  background:rgba(4,9,24,.78);
  border:1px solid var(--line);
  border-radius:1.6cqw;
  padding:1.4cqw 2cqw;
  font-family:var(--num);font-size:2.7cqw;font-weight:600;
  font-variant-numeric:tabular-nums;line-height:1.65;
  backdrop-filter:blur(4px);
}
.hud-row{display:flex;align-items:center;gap:1.4cqw;white-space:nowrap}
.hud-row i{width:1.8cqw;height:1.8cqw;border-radius:50%;background:var(--c);box-shadow:0 0 1.4cqw var(--c)}
.hud-row em{font-style:normal;color:var(--text);min-width:8cqw}
.hud-row span{color:var(--dim)}
.map-legend{
  position:absolute;left:1.6cqw;bottom:1.4cqw;
  font-size:2.3cqw;color:var(--dim);letter-spacing:.06em;
  background:rgba(4,9,24,.6);border-radius:1.2cqw;padding:.8cqw 1.6cqw;
}

/* ── 空间站卡片(单卡 ISS + 天宫 分组)── */
#cards{
  flex:0 0 auto;          /* 卡片按内容高度撑开,不强制占用 */
  min-height:0;
  display:flex;flex-direction:column;gap:1.2cqh;
  padding:.4cqh 2.6cqw;
}
.scard{
  background:var(--panel);
  border:1px solid var(--line);
  border-left:3px solid var(--c);
  border-radius:2cqw;
  padding:.9cqh 2.8cqw;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.scard-head{display:flex;align-items:baseline;gap:2cqw;flex:0 0 auto}
.scard-head h2{font-size:3.4cqw;font-weight:700;letter-spacing:.06em}
.scard-head small{font-family:var(--num);font-weight:600;font-size:2.3cqw;color:var(--dim);letter-spacing:.1em}
.badge{
  margin-left:auto;font-size:2.2cqw;letter-spacing:.2em;
  color:var(--live);border:1px solid var(--live);
  border-radius:99px;padding:.2cqh 2cqw;
}
/* 分组(ISS / 天宫) */
.crew-block{
  margin-top:.9cqh;
  border-top:1px dashed var(--line);
  padding-top:.5cqh;
}
.crew-block:first-of-type{margin-top:.6cqh}
.crew-block-title{
  display:flex;align-items:center;gap:1.2cqw;
  font-family:var(--num);font-weight:700;font-size:2.6cqw;
  letter-spacing:.10em;color:var(--text);
  margin-bottom:.4cqh;
}
.crew-block-title i{
  width:1.6cqw;height:1.6cqw;border-radius:50%;background:var(--c);
  box-shadow:0 0 1cqw var(--c);
}
.crew-block-title em{
  font-style:normal;margin-left:auto;color:var(--c);
  font-family:var(--num);font-weight:700;font-size:2.6cqw;
}
.stats,.meta-line{display:none !important}   /* 不再使用,统一关闭以便旧样式不影响 */
.crew{
  margin-top:.3cqh;
  display:grid;
  /* 同屏并列多列,头像不大、并排多列 */
  grid-template-columns:repeat(auto-fill,minmax(8.5cqw,1fr));
  grid-auto-rows:min-content;
  gap:.8cqw .5cqw;
  align-content:start;
  /* 多行铺开不滚动,内容决定 crew-block 撑开 */
  overflow:visible;
}
.crew::-webkit-scrollbar{display:none}
.crew-loading,.crew-error{font-size:2.4cqw;color:var(--dim);align-self:center;grid-column:1/-1}
.crew-error{color:var(--warn)}
.astro{width:100%;text-align:center;min-width:0}
.avatar{
  width:6.4cqw;height:6.4cqw;margin:0 auto;border-radius:50%;
  border:1.2px solid var(--c);overflow:hidden;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.avatar .initials{font-family:var(--num);font-weight:700;font-size:2.4cqw;color:var(--c)}
.aname{font-size:1.9cqw;margin-top:.25cqh;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adays{font-family:var(--num);font-weight:600;font-size:1.8cqw;color:var(--dim);margin-top:.05cqh;white-space:nowrap}

/* ── 空地通信 / 空地通话音频 ─────────────── */
#comm{
  flex:1 1 auto;          /* 撑满 stage 剩余空间 */
  min-height:0;
  margin:0 2.6cqw 1.2cqh;
  background:var(--panel);border:1px solid var(--line);border-radius:2cqw;
  padding:0;             /* 展开态要 iframe 占满,所以 padding=0 */
  position:relative;
  display:flex;
  align-items:center;justify-content:center;
  overflow:hidden;
}
.comm-title,.comm-row{display:none !important}

/* 按钮 — 折叠态 */
#audioBtn{
  font-family:var(--sans);font-size:2.8cqw;color:var(--iss);
  background:transparent;border:1px solid var(--iss);border-radius:99px;
  padding:.7cqh 2.6cqw;cursor:pointer;letter-spacing:.06em;
  z-index:1;
}
#audioBtn:focus-visible{outline:2px solid var(--live);outline-offset:2px}
#audioBtn:hover{background:rgba(127,216,255,.12)}

/* audioBox — 展开态:占满 #comm */
#audioBox{
  position:absolute;inset:0;
  z-index:2;
  background:#000;
  border-radius:inherit;
  overflow:hidden;
  display:flex;flex-direction:column;
}
#audioBox .ab-frame{
  flex:1 1 auto;
  min-height:0;
  position:relative;
  background:#000;
}
#audioBox iframe{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:0;display:block;
}
#audioBox .ab-frame.audio-only iframe{
  /* 仅音频模式:youtube 只占底部音轨条,视频画面隐藏 */
  height:50px;
  bottom:0;top:auto;
  pointer-events:none;
}
#audioBox .ab-frame.audio-only::after{
  content:'🔊 仅音频 Listening…';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--iss);
  background:linear-gradient(180deg,rgba(8,16,32,.92),rgba(2,6,15,.96));
  font-family:var(--num);font-weight:600;font-size:2.6cqw;
  letter-spacing:.18em;
}
#audioBox .ab-frame.audio-only .fallback{display:none}
#audioBox .fallback{
  position:absolute;left:0;right:0;bottom:0;
  font-size:2cqw;padding:.5cqh 1.8cqw;color:var(--dim);background:rgba(2,6,15,.8);
  display:flex;gap:1.4cqw;flex-wrap:wrap;align-items:center;
}
#audioBox .fallback a{color:var(--iss);text-decoration:none}
.ab-bar{
  flex:0 0 auto;
  display:flex;align-items:center;gap:1.4cqw;
  padding:.45cqh 1.4cqw;
  background:rgba(2,6,15,.94);
  border-bottom:1px solid var(--line);
  font-family:var(--num);font-size:2.2cqw;color:var(--dim);
}
.ab-bar .ab-title{letter-spacing:.18em}
.ab-tools{margin-left:auto;display:flex;gap:1.2cqw;align-items:center}
.ab-btn{
  font-family:var(--sans);font-size:2.1cqw;
  color:var(--text);
  background:rgba(255,255,255,.06);
  border:1px solid var(--line-strong);
  border-radius:6px;
  padding:.2cqh 1.4cqw;cursor:pointer;
  letter-spacing:.05em;
}
.ab-btn:hover{background:rgba(120,200,255,.16);color:var(--iss)}
.ab-btn.on{background:var(--iss);color:#02060f;border-color:var(--iss)}
[hidden]{display:none!important}
/* ── 底部滚动条 ────────────────────── */
#ticker{
  flex:0 0 auto;border-top:1px solid var(--line);
  padding:.7cqh 0;overflow:hidden;white-space:nowrap;
  font-family:var(--num);font-weight:600;font-size:2.5cqw;color:var(--dim);
  letter-spacing:.08em;
}
#ticker .inner{display:inline-block;padding-left:100%;animation:tick 36s linear infinite}
@keyframes tick{to{transform:translateX(-100%)}}
@media (prefers-reduced-motion:reduce){
  #ticker .inner,.live-dot,.dot.on{animation:none}
}
</style>
</head>
<body>
<div id="stage">

  <header>
    <div class="brand">
      <div class="live-dot"></div>
      <h1>空间站实时追踪<small>ORBITAL TRACKER · LIVE</small></h1>
    </div>
    <div class="clocks">
      <div><span>UTC</span><b id="clkUtc">--:--:--</b></div>
      <div><span>北京</span><b id="clkBjt">--:--:--</b></div>
    </div>
  </header>

  <div id="mapWrap">
    <canvas id="map"></canvas>
    <div class="map-hud">
      <div class="hud-row" style="--c:var(--iss)"><i></i><em>ISS</em><span id="hud-iss">定位中…</span></div>
      <div class="hud-row" style="--c:var(--tg)"><i></i><em>天宫</em><span id="hud-tg">定位中…</span></div>
    </div>
    <div class="map-legend">━ 轨道预测 90 min · 阴影为夜半球</div>
  </div>

  <div id="cards">
    <section class="scard" id="card-crew" style="--c:var(--iss)">
      <div class="scard-head">
        <h2>在轨乘组 CREW ABOARD</h2><small>ISS · 天宫 CSS</small>
        <span class="badge">实时</span>
      </div>
      <!-- 分组分块:ISS -->
      <div class="crew-block" id="crew-block-iss" style="--c:var(--iss)">
        <div class="crew-block-title"><i></i>ISS 国际空间站 <em id="iss-count">--</em></div>
        <div class="crew" id="iss-crew"><div class="crew-loading">正在获取乘组名单…</div></div>
      </div>
      <!-- 分组分块:天宫 -->
      <div class="crew-block" id="crew-block-tg" style="--c:var(--tg)">
        <div class="crew-block-title"><i></i>天宫 中国空间站 <em id="tg-count">--</em></div>
        <div class="crew" id="tg-crew"><div class="crew-loading">正在获取乘组名单…</div></div>
      </div>
    </section>
  </div>

  <div id="comm">
    <!-- 折叠态:只显示按钮;展开态:youtube 嵌入填满 #comm -->
    <button id="audioBtn" type="button">▶ 空地通话音频</button>
    <div id="audioBox" hidden aria-hidden="true">
      <div class="ab-bar" id="abBar">
        <span class="ab-title">🔊 NASA ISS · SPACE-TO-GROUND</span>
        <div class="ab-tools">
          <button class="ab-btn" id="abAudioOnly" type="button" title="仅音频:隐藏 YouTube 视频,只听通话音">仅音频</button>
          <button class="ab-btn" id="abMinimize"  type="button" title="收起">收起</button>
          <button class="ab-btn" id="abClose"    type="button" title="关闭">✕</button>
        </div>
      </div>
      <div class="ab-frame" id="abFrame"></div>
    </div>
  </div>

  <div id="ticker"><span class="inner" id="tickerText">正在初始化轨道解算引擎…</span></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.4/dist/satellite.min.js"></script>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);
const RAD=Math.PI/180;

/* ══ 空间站定义 ══════════════════════════ */
const STATIONS={
  iss:{key:'iss',label:'ISS',cat:25544,color:'#5bd8ff',satrec:null,geo:null,track:[],tleSrc:'',tleAge:0},
  tg :{key:'tg', label:'天宫',cat:48274,color:'#ff7a52',satrec:null,geo:null,track:[],tleSrc:'',tleAge:0}
};
/* 离线兜底 TLE(仅在所有数据源不可达时使用,会标注"离线TLE") */
const FALLBACK_TLE={
  25544:['1 25544U 98067A   26019.50000000  .00016717  00000-0  30000-3 0  9990',
         '2 25544  51.6400 200.0000 0004000  90.0000 270.0000 15.50000000493007'],
  48274:['1 48274U 21035A   26019.50000000  .00020000  00000-0  25000-3 0  9991',
         '2 48274  41.4700 100.0000 0004000  90.0000 270.0000 15.62000000267009']
};

/* ══ TLE 获取(多级数据源) ═══════════════ */
async function jfetch(url,asText){
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok) throw new Error(r.status);
  return asText?r.text():r.json();
}
async function fetchTLE(cat){
  try{
    const t=await jfetch(`https://celestrak.org/NORAD/elements/gp.php?CATNR=${cat}&FORMAT=TLE`,true);
    const L=t.trim().split(/\r?\n/).map(s=>s.trim());
    const i=L.findIndex(s=>s.startsWith('1 '));
    if(i>=0&&L[i+1]) return {l1:L[i],l2:L[i+1],src:'CelesTrak'};
  }catch(e){}
  try{
    const j=await jfetch(`https://tle.ivanstanojevic.me/api/tle/${cat}`);
    if(j.line1) return {l1:j.line1,l2:j.line2,src:'TLE-API'};
  }catch(e){}
  if(cat===25544){
    try{
      const j=await jfetch('https://api.wheretheiss.at/v1/satellites/25544/tles');
      if(j.line1) return {l1:j.line1,l2:j.line2,src:'WhereTheISS'};
    }catch(e){}
  }
  return {l1:FALLBACK_TLE[cat][0],l2:FALLBACK_TLE[cat][1],src:'offline'};
}
async function loadTLEs(){
  await Promise.all(Object.values(STATIONS).map(async st=>{
    const t=await fetchTLE(st.cat);
    try{
      st.satrec=satellite.twoline2satrec(t.l1,t.l2);
      st.tleSrc=t.src;
    }catch(e){console.error('TLE解析失败',st.label,e);}
  }));
  rebuildTracks();
  updateTicker();
}

/* ══ SGP4 解算 ══════════════════════════ */
function geoAt(st,date){
  if(!st.satrec) return null;
  try{
    const pv=satellite.propagate(st.satrec,date);
    if(!pv||!pv.position||typeof pv.position.x!=='number') return null;
    const gmst=satellite.gstime(date);
    const g=satellite.eciToGeodetic(pv.position,gmst);
    const v=pv.velocity?Math.hypot(pv.velocity.x,pv.velocity.y,pv.velocity.z):0;
    return {lat:satellite.degreesLat(g.latitude),lon:satellite.degreesLong(g.longitude),alt:g.height,vel:v};
  }catch(e){return null;}
}
function tleAgeDays(st){
  if(!st.satrec) return 99;
  const nowJd=Date.now()/86400000+2440587.5;
  return nowJd-(st.satrec.jdsatepoch||nowJd);
}
function rebuildTracks(){
  const now=Date.now();
  for(const st of Object.values(STATIONS)){
    const pts=[];
    for(let m=-12;m<=96;m+=1){
      const g=geoAt(st,new Date(now+m*60000));
      if(g) pts.push({lon:g.lon,lat:g.lat,future:m>0});
    }
    st.track=pts;
    st.tleAge=tleAgeDays(st);
  }
}
setInterval(rebuildTracks,20000);

/* ══ 太阳直射点 & 晨昏线 ═════════════════ */
function sunPos(date){
  const n=date/86400000+2440587.5-2451545;
  const L=(280.46+.9856474*n)%360;
  const g=((357.528+.9856003*n)%360)*RAD;
  const lam=(L+1.915*Math.sin(g)+.02*Math.sin(2*g))*RAD;
  const obl=(23.439-4e-7*n)*RAD;
  const dec=Math.asin(Math.sin(obl)*Math.sin(lam));
  const ra=Math.atan2(Math.cos(obl)*Math.sin(lam),Math.cos(lam));
  let gmst=(18.697374558+24.06570982441908*n)%24;
  let lon=ra/RAD-gmst*15;
  lon=((lon+540)%360)-180;
  return {lat:dec/RAD,lon};
}

/* ══ 地图渲染 ═══════════════════════════
   采用真实地球贴图:加载 NASA Blue Marble 等距圆柱投影 PNG,
   支持 CORS 的 CDN 缓存,跨域使用 crossOrigin='anonymous'。
   若贴图加载失败则回退到本文档内绘制的真实风格地图
   (海洋深蓝渐变 + 真实海岸线 GeoJSON 着色 + 极地冰盖 + 经纬网)。 */
const canvas=$('map'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,worldGeo=null;
const baseCv=document.createElement('canvas'),nightCv=document.createElement('canvas');
const X=lon=>(lon+180)/360*W, Y=lat=>(90-lat)/180*H;

const blueMarble=new Image();
blueMarble.crossOrigin='anonymous';
let bmLoaded=false,bmFailed=false;
blueMarble.onload=()=>{bmLoaded=true;drawBase();};
blueMarble.onerror=()=>{bmFailed=true;drawBase();console.warn('Blue Marble 贴图加载失败,回退到矢量绘制');};
const BM_CANDIDATES=[
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg',
  'https://unpkg.com/three@0.160.0/examples/textures/planets/earth_atmos_2048.jpg',
  'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/earth_atmos_2048.jpg'
];
function tryBM(i){
  if(i>=BM_CANDIDATES.length){bmFailed=true;drawBase();return;}
  blueMarble.src=BM_CANDIDATES[i];
  blueMarble.onerror=()=>tryBM(i+1);
}
tryBM(0);

async function loadWorld(){
  try{
    worldGeo=await jfetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
  }catch(e){console.warn('世界地图数据获取失败,可降级仅有贴图/经纬网',e);}
  drawBase();
}
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=canvas.getBoundingClientRect();
  W=Math.round(r.width*DPR);H=Math.round(r.height*DPR);
  canvas.width=W;canvas.height=H;
  baseCv.width=W;baseCv.height=H;
  nightCv.width=W;nightCv.height=H;
  drawBase();drawNight();
}

/* 真实地球底图绘制:
   优先绘制 NASA Blue Marble 等距圆柱贴图,
   在贴图加载完成前后绘制经纬网以便降级使用。
   叠加极地冰盖、陆地湖泊海岸线等不再额外绘制(贴图已包含)。 */
function drawBase(){
  const c=baseCv.getContext('2d');
  c.clearRect(0,0,W,H);
  /* 贴图优先 — 加饱和与提亮,接近真实地球色彩 */
  if(bmLoaded&&blueMarble.width>1){
    c.drawImage(blueMarble,0,0,W,H);
    c.save();
    /* 1) 先用更亮的同尺寸副本叠加、blur 些,模拟清晰化 */
    c.globalCompositeOperation='lighter';
    c.globalAlpha=.10;
    c.drawImage(blueMarble,0,0,W,H);
    c.globalAlpha=1;
    c.globalCompositeOperation='source-over';
    /* 2) 提亮 + 增饱和:office 用饱和 overlay */
    c.filter='saturate(1.5) brightness(1.15)';
    c.globalAlpha=.30;
    c.drawImage(blueMarble,0,0,W,H);
    c.filter='none';
    c.globalAlpha=1;
    /* 3) 一层绿加成 — 让陆地更接近鲜绿蓝 */
    c.globalCompositeOperation='overlay';
    c.fillStyle='rgba(70,120,80,.20)';c.fillRect(0,0,W,H);
    c.globalCompositeOperation='source-over';
    /* 4) 高光:顶/底微蓝边 */
    const grd=c.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,'rgba(170,210,255,.20)');
    grd.addColorStop(.5,'rgba(180,245,180,.06)');
    grd.addColorStop(1,'rgba(170,210,255,.20)');
    c.fillStyle=grd;c.fillRect(0,0,W,H);
    c.restore();
    drawGrid(c,/*overlay*/true);
    return;
  }
  /* 矢量回退:更亮的真实海洋青蓝 + 鲜绿大陆 */
  const sea=c.createLinearGradient(0,0,0,H);
  sea.addColorStop(0,'#13508c');    /* 北极近青蓝 */
  sea.addColorStop(.3,'#0068ad');   /* 高纬海面 */
  sea.addColorStop(.6,'#0a69b5');   /* 大洋蓝 */
  sea.addColorStop(.8,'#0072bd');   /* 赤道海蓝 */
  sea.addColorStop(1,'#0a82c8');    /* 南极近青 */
  c.fillStyle=sea;c.fillRect(0,0,W,H);
  /* 海面再叠一层轻微纹理 */
  c.fillStyle='rgba(96,170,225,.10)';c.fillRect(0,0,W,H);
  drawGrid(c,false);
  drawLand(c);
  if(bmFailed===undefined||bmFailed===false){
    /* 贴图还在加载中,.drawText 提示 */
  }
}
function drawGrid(c,overlay){
  c.strokeStyle=overlay?'rgba(150,190,235,.16)':'rgba(120,170,225,.18)';
  c.lineWidth=1;
  for(let lon=-150;lon<180;lon+=30){
    c.beginPath();c.moveTo(X(lon),0);c.lineTo(X(lon),H);c.stroke();
  }
  for(let lat=-60;lat<90;lat+=30){
    c.beginPath();c.moveTo(0,Y(lat));c.lineTo(W,Y(lat));c.stroke();
  }
  c.strokeStyle='rgba(180,220,255,.36)';
  c.beginPath();c.moveTo(0,Y(0));c.lineTo(W,Y(0));c.stroke(); /* 赤道 */
}
/* 矢量回退:用真实风格着色大陆轮廓(纬度配色) */
function latColor(lat){
  const a=Math.abs(lat);
  if(a>=78)return '#f6fbff';        /* 极地冰盖:近白 */
  if(a>=62)return '#d8e6ec';        /* 寒带:浅灰 */
  if(a>=45)return '#4fbb70';        /* 温带森林:深绿 */
  if(a>=30)return '#5fcf6a';        /* 亚热带:鲜绿 */
  if(a>=15)return '#86d35a';        /* 热带草原:亮绿 */
  if(a>=10)return '#b8c938';        /* 半干旱:黄绿 */
  return '#d6b13c';                 /* 沙漠:金黄棕 */
}
function drawLand(c){
  if(!worldGeo)return;
  const ring=r=>{c.moveTo(X(r[0][0]),Y(r[0][1]));for(let i=1;i<r.length;i++)c.lineTo(X(r[i][0]),Y(r[i][1]));c.closePath();};
  c.lineWidth=Math.max(.8,DPR*.6);
  /* 先用平均纬度给整个国家上色 */
  c.save();
  for(const f of worldGeo.features){
    const g=f.geometry;if(!g)continue;
    let polys=[];
    if(g.type==='Polygon')polys=[g.coordinates];
    else if(g.type==='MultiPolygon')polys=g.coordinates;
    /* 估算平均纬度 */
    let latSum=0,cnt=0;
    for(const p of polys)for(const r of p)for(const pt of r){latSum+=pt[1];cnt++;}
    const latAvg=cnt?latSum/cnt:0;
    c.fillStyle=latColor(latAvg);
    c.strokeStyle='rgba(220,230,245,.45)';
    c.beginPath();
    for(const p of polys)for(const r of p)ring(r);
    c.fill();c.stroke();
  }
  c.restore();
}
function drawNight(){
  const c=nightCv.getContext('2d');
  c.clearRect(0,0,W,H);
  const s=sunPos(new Date());
  const dec=Math.abs(s.lat)<.4?(s.lat<0?-.4:.4):s.lat; /* 避免除零 */
  c.fillStyle='rgba(1,4,16,.52)';
  c.beginPath();
  for(let lon=-180;lon<=180;lon+=2){
    const h=(lon-s.lon)*RAD;
    const lat=Math.atan(-Math.cos(h)/Math.tan(dec*RAD))/RAD;
    lon===-180?c.moveTo(X(lon),Y(lat)):c.lineTo(X(lon),Y(lat));
  }
  const poleY=dec>0?H:0; /* 太阳在北半球 → 夜区伸向南极 */
  c.lineTo(W,poleY);c.lineTo(0,poleY);
  c.closePath();c.fill();
  /* 太阳直射点 */
  const sx=X(s.lon),sy=Y(s.lat);
  const gr=c.createRadialGradient(sx,sy,0,sx,sy,10*DPR);
  gr.addColorStop(0,'rgba(255,225,140,.9)');gr.addColorStop(1,'rgba(255,225,140,0)');
  c.fillStyle=gr;c.beginPath();c.arc(sx,sy,10*DPR,0,7);c.fill();
}
setInterval(drawNight,60000);

/* 轨道线绘制:
   将"过去(future=false)"和"未来(future=true)"分别拆成独立子段,
   每个子段用一条独立 beginPath() 路径,避免 dash 相位在不同子路径
   上跨段累积产生的视觉错位,从而让 ISS/CSS 当前位置前后的实线与
   虚线交接点连续对接。跨子午线 ±180° 的边界天然切分,无需特判。 */
function drawTrack(st){
  if(!st.track||!st.track.length)return;
  /* 预先把轨迹拆成「不跨子午线」的连续片段 */
  const lonSegs=[];let cur=[];let prev=null;
  for(const p of st.track){
    if(prev&&Math.abs(p.lon-prev.lon)>180){
      if(cur.length)lonSegs.push(cur);
      cur=[p];prev=p;continue;
    }
    cur.push(p);prev=p;
  }
  if(cur.length)lonSegs.push(cur);
  /* 再把每个 lonSeg 按 future 拆成精细子段 */
  const paths={past:[],future:[]};
  for(const seg of lonSegs){
    let buf=[];let kind=null;
    for(const p of seg){
      const k=p.future?'future':'past';
      if(kind!==null&&k!==kind){
        if(buf.length>1)paths[kind].push(buf);
        buf=[];kind=k;
      }
      buf.push(p);kind=k;
    }
    if(buf.length>1)paths[kind].push(buf);
  }
  /* 绘制 past (虚线) */
  ctx.strokeStyle=st.color;
  ctx.globalAlpha=.35;
  ctx.lineWidth=1.3*DPR;
  ctx.setLineDash([3*DPR,4*DPR]);
  for(const seg of paths.past){
    ctx.beginPath();
    seg.forEach((p,i)=>{const x=X(p.lon),y=Y(p.lat);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
  }
  /* 绘制 future (实线) */
  ctx.globalAlpha=.9;
  ctx.lineWidth=1.8*DPR;
  ctx.setLineDash([]);
  for(const seg of paths.future){
    ctx.beginPath();
    seg.forEach((p,i)=>{const x=X(p.lon),y=Y(p.lat);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
  }
  ctx.setLineDash([]);ctx.globalAlpha=1;
}
/* 空间站标志符号:用真实外形替代小亮点
   ISS:桁架+四对太阳能板+中央加压舱+散热板
   CSS (天宫):T 字主体+三对太阳能板+附加舱
   形状保持以 (x,y) 为中心,与速度方向无关的简化正视图。 */
function stationIcon(st,x,y,scale){
  const s=scale*DPR;
  ctx.save();
  ctx.translate(x,y);
  if(st.key==='iss'){
    /* 桁架主梁(横向) */
    ctx.fillStyle='#cdd6e0';
    ctx.fillRect(-2.4*s,-0.35*s,4.8*s,0.7*s);
    /* 居中加压舱 */
    ctx.fillStyle='#e3eaf2';
    ctx.fillRect(-0.7*s,-0.6*s,1.4*s,1.2*s);
    /* 四对太阳能板(两两对称) */
    ctx.fillStyle='#1b2b4a';
    for(const sx of [-1,1]){
      /* 左/右两块 */
      for(const ox of [-2.0,-1.2,1.2,2.0]){
        const px=ox*s;
        ctx.fillRect(px-0.36*s,-1.8*s,0.72*s,1.5*s);
        ctx.fillRect(px-0.36*s, 0.3*s,0.72*s,1.5*s);
        /* 中央杆 */
        ctx.fillStyle='#3d5278';
        ctx.fillRect(px-0.04*s,-1.8*s,0.08*s,3.6*s);
        ctx.fillStyle='#1b2b4a';
      }
      void sx;
    }
    /* 散热板(琥珀色细条) */
    ctx.fillStyle='#7fd8ff';
    ctx.fillRect(-2.4*s,-0.1*s,4.8*s,0.2*s);
  }else if(st.key==='tg'){
    /* 天宫:核心舱居中+两侧节点舱,顶部对日翼 */
    /* 核心舱 */
    ctx.fillStyle='#d8e0ea';
    ctx.fillRect(-0.55*s,-0.55*s,1.1*s,1.1*s);
    /* 左右实验舱(天和二侧) */
    ctx.fillStyle='#c5cdd6';
    ctx.fillRect(-1.6*s,-0.35*s,1.0*s,0.7*s);
    ctx.fillRect( 0.6*s,-0.35*s,1.0*s,0.7*s);
    /* 对接舱(顶部小段) */
    ctx.fillStyle='#a9b4be';
    ctx.fillRect(-0.18*s,-1.1*s,0.36*s,0.55*s);
    /* 太阳能板:上下各三片 */
    ctx.fillStyle='#26365a';
    for(const ox of [-1.1,0,1.1]){
      const px=ox*s;
      ctx.fillRect(px-0.5*s,-2.5*s,1.0*s,1.0*s);
      ctx.fillRect(px-0.5*s, 1.5*s,1.0*s,1.0*s);
      ctx.fillStyle='#3d5278';
      ctx.fillRect(px-0.04*s,-2.5*s,0.08*s,5.0*s);
      ctx.fillStyle='#26365a';
    }
  }
  ctx.restore();
}

function drawMarker(st,t){
  if(!st.geo)return;
  const x=X(st.geo.lon),y=Y(st.geo.lat);
  const p=(t%2200)/2200;
  /* 脉冲圈 */
  ctx.strokeStyle=st.color;ctx.globalAlpha=(1-p)*.5;
  ctx.lineWidth=1.4*DPR;
  ctx.beginPath();ctx.arc(x,y,(4+11*p)*DPR,0,7);ctx.stroke();
  ctx.globalAlpha=1;
  /* 投影 glow */
  ctx.shadowColor=st.color;ctx.shadowBlur=6*DPR;
  /* 实际外形 */
  stationIcon(st,x,y,1.8);
  ctx.shadowBlur=0;
  /* 高亮中心白点便于视觉锁定 */
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x,y,1.0*DPR,0,7);ctx.fill();
  /* 标签 — 含高度与速度 */
  const txt=`${st.label} · ${Math.round(st.geo.alt)}km · ${st.geo.vel.toFixed(2)}km/s`;
  ctx.font=`600 ${10*DPR}px Rajdhani,sans-serif`;
  const tw=ctx.measureText(txt).width;
  let lx=x+10*DPR,ly=y-7*DPR;
  if(lx+tw>W-4)lx=x-tw-10*DPR;
  if(ly<12*DPR)ly=y+14*DPR;
  ctx.lineWidth=3*DPR;ctx.strokeStyle='rgba(2,6,15,.92)';
  ctx.strokeText(txt,lx,ly);
  ctx.fillStyle=st.color;ctx.fillText(txt,lx,ly);
}
function render(t){
  try{
    if(W>0&&baseCv.width>0){
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(baseCv,0,0);
      ctx.drawImage(nightCv,0,0);
      drawTrack(STATIONS.iss);drawTrack(STATIONS.tg);
      drawMarker(STATIONS.iss,t||0);drawMarker(STATIONS.tg,t||0);
    }
  }catch(e){
    if(!render.err){render.err=1;console.error('渲染异常',e);}
  }
  requestAnimationFrame(render);
}

/* ══ 数据面板刷新 ═══════════════════════ */
const fmtLat=v=>`${Math.abs(v).toFixed(2)}°${v>=0?'N':'S'}`;
const fmtLon=v=>`${Math.abs(v).toFixed(2)}°${v>=0?'E':'W'}`;
function tick(){
  const now=new Date();
  $('clkUtc').textContent=now.toISOString().slice(11,19);
  $('clkBjt').textContent=new Date(now.getTime()+288e5).toISOString().slice(11,19);
  for(const st of Object.values(STATIONS)){
    st.geo=geoAt(st,now);
    const g=st.geo,k=st.key;
    if(!g)continue;
    /* 卡片已被合并到乘组卡,不在卡片显示经纬高等;HUD 在地图右上是主信息源 */
    const hud=$('hud-'+k);
    if(hud)hud.textContent=`${fmtLat(g.lat)} ${fmtLon(g.lon)} · ${Math.round(g.alt)}km · ${g.vel.toFixed(2)}km/s`;
  }
}
setInterval(tick,1000);

const CN_NAMES={
  'Chen Dong':'陈冬','Chen Zhongrui':'陈中瑞','Wang Jie':'王杰',
  'Cai Xuzhe':'蔡旭哲','Song Lingdong':'宋令东','Wang Haoze':'王浩泽',
  'Zhang Lu':'张陆','Wu Fei':'武飞','Zhang Hongzhang':'张洪章',
  'Jing Haipeng':'景海鹏','Zhu Yangzhu':'朱杨柱','Gui Haichao':'桂海潮',
  'Tang Hongbo':'汤洪波','Tang Shengjie':'唐胜杰','Jiang Xinlin':'江新林',
  'Ye Guangfu':'叶光富','Li Cong':'李聪','Li Guangsu':'李广苏',
  'Liu Yang':'刘洋','Wang Yaping':'王亚平','Zhai Zhigang':'翟志刚',
  'Nie Haisheng':'聂海胜','Liu Boming':'刘伯明','Fei Junlong':'费俊龙',
  'Deng Qingming':'邓清明','Yang Hongbo':'杨宏波'
};
const flagEmoji=cc=>cc&&cc.length===2?String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))):'';
function daysInSpace(p){
  let t=p.launched;
  if(typeof t==='number'&&t>1e9)t*=1000;
  else if(typeof t==='string')t=Date.parse(t);
  if(t&&isFinite(t)&&t>0)return Math.max(0,Math.floor((Date.now()-t)/86400000));
  if(typeof p.days_in_space==='number')return p.days_in_space;
  return null;
}
function crewChip(p){
  const el=document.createElement('div');el.className='astro';
  const cn=CN_NAMES[p.name];
  const days=daysInSpace(p);
  const initials=(p.name||'?').split(/\s+/).map(s=>s[0]).slice(0,2).join('').toUpperCase();
  el.innerHTML=`
    <div class="avatar"><span class="initials">${initials}</span></div>
    <div class="aname" title="${p.name}${p.spacecraft?' · '+p.spacecraft:''}${p.position?' · '+p.position:''}">${cn||p.name} ${flagEmoji(p.flag_code)}</div>
    <div class="adays">${days!=null?'在轨 '+days+' 天':(p.agency||'')}</div>`;
  if(p.image){
    const img=new Image();
    img.referrerPolicy='no-referrer';img.alt=p.name;
    img.onload=()=>{const av=el.querySelector('.avatar');av.innerHTML='';av.appendChild(img);};
    img.onerror=()=>{if(img.src!==p.image){img.src=p.image;}}; /* 缩略图失败则回退原图 */
    img.src=thumbURL(p.image);
  }
  return el;
}
/* 维基共享资源原图动辄数 MB,转成 240px 缩略图 */
function thumbURL(u){
  const m=/^https:\/\/upload\.wikimedia\.org\/wikipedia\/commons\/([0-9a-f])\/([0-9a-f]{2})\/([^/]+)$/i.exec(u||'');
  return m?`https://upload.wikimedia.org/wikipedia/commons/thumb/${m[1]}/${m[2]}/${m[3]}/240px-${m[3]}`:u;
}
function renderCrew(listId,people){
  const box=$(listId);box.innerHTML='';
  /* 更新计数器 */
  const cnt=$(listId.replace('crew','count'));
  if(cnt)cnt.textContent=people.length+'人';
  if(!people.length){box.innerHTML='<div class="crew-error">暂无乘组数据</div>';return;}
  people.forEach(p=>box.appendChild(crewChip(p)));
}
/* 乘组已多行显示,不再需要自动横滚 */
async function loadCrew(){
  const sources=[
    'https://raw.githubusercontent.com/corquaid/international-space-station-APIs/main/JSON/people-in-space.json',
    'https://corquaid.github.io/international-space-station-APIs/JSON/people-in-space.json'
  ];
  let data=null;
  for(const u of sources){try{data=await jfetch(u);break;}catch(e){}}
  if(!data){ /* 最后兜底:open-notify(仅姓名) */
    try{
      const j=await jfetch('http://api.open-notify.org/astros.json');
      data={people:j.people.map(p=>({name:p.name,spacecraft:p.craft}))};
    }catch(e){}
  }
  if(!data||!Array.isArray(data.people)){
    $('iss-crew').innerHTML=$('tg-crew').innerHTML='<div class="crew-error">乘组数据源不可达</div>';
    return;
  }
  /* corquaid 源用 iss 布尔字段标记归属;open-notify 兜底源用 craft 名称 */
  const craft=p=>String(p.spacecraft||p.location||'').toLowerCase();
  const isTG=p=>p.iss===false||/tiangong|css|tianhe|shenzhou/.test(craft(p));
  const isISS=p=>!isTG(p)&&(p.iss===true||/\biss\b|dragon|soyuz|starliner/.test(craft(p)));
  renderCrew('iss-crew',data.people.filter(isISS));
  renderCrew('tg-crew',data.people.filter(isTG));
}

/* ══ 空地通信模块已下线 ─ │
   原本基于 NASA ISSLive Lightstreamer 推送 AOS/LOS 状态与遥测时钟。
   按需求,空地区域仅保留"空地通话音频"按钮,遥测/状态日志不再展示。 ══ */
/* NASA 空地通话音频(官方 ISS 常驻直播流,含 space-to-ground 音频)
   新行为:
   - 点击 #audioBtn -> audioBox 在 #comm 内展开,占满整个 #comm 区域自动适配大小
   - 再次点击或点击 ✕ -> 折叠回按钮态
   - 「仅音频」可隐藏 YouTube 视频画面、仅听通话音(40px 音轨条) */
const YT_LIVE='https://www.youtube.com/embed/uwXgcTc8oY8?autoplay=1&modestbranding=1&rel=0';
const YT_FALLBACK_HTML=`<div class="fallback">NASA 官方 ISS 直播 · 无法播放时
  <a href="https://www.youtube.com/@NASA/live" target="_blank" rel="noopener">去 YouTube 打开</a>
  <a href="https://plus.nasa.gov/scheduled-video/iss-live/" target="_blank" rel="noopener">NASA+</a></div>`;
const audioBox=$('audioBox'),abFrame=$('abFrame'),audioBtn=$('audioBtn');
let abOpen=false,abAudioOnly=false;
function audioBoxFrameInner(){
  abFrame.innerHTML=`<iframe src="${YT_LIVE}" allow="autoplay; encrypted-media" title="NASA ISS Live"></iframe>${YT_FALLBACK_HTML}`;
}
function setAudioOnly(on){
  abAudioOnly=on;
  abFrame.classList.toggle('audio-only',on);
  const btn=$('abAudioOnly');
  btn.classList.toggle('on',on);
  btn.textContent=on?'有声':'仅音频';
}
function openAudioBox(){
  if(abOpen)return;
  audioBoxFrameInner();
  audioBox.hidden=false;
  audioBox.setAttribute('aria-hidden','false');
  abOpen=true;
  audioBtn.textContent='⏹ 关闭音频';
  audioBtn.setAttribute('aria-expanded','true');
}
function closeAudioBox(){
  abFrame.innerHTML='';
  audioBox.hidden=true;
  audioBox.setAttribute('aria-hidden','true');
  abOpen=false;
  audioBtn.textContent='▶ 空地通话音频';
  audioBtn.setAttribute('aria-expanded','false');
}
audioBtn.addEventListener('click',()=>{ abOpen?closeAudioBox():openAudioBox(); });
$('abAudioOnly').addEventListener('click',()=>setAudioOnly(!abAudioOnly));
$('abMinimize').addEventListener('click',closeAudioBox);
$('abClose').addEventListener('click',closeAudioBox);

/* ══ 底部滚动条 ═════════════════════════ */
function updateTicker(){
  const s=STATIONS;
  $('tickerText').textContent=
    `数据源:CelesTrak TLE(ISS ${s.iss.tleSrc||'…'} / 天宫 ${s.tg.tleSrc||'…'})· 位置由 SGP4 模型逐秒实时解算 · `+
    `乘组数据:Open Notify / corquaid People-in-Space API · 空地通话:NASA 官方 ISS 直播 · `+
    `本页面为公开数据聚合展示,非官方产品 ─── `;
}

/* ══ 启动 ═══════════════════════════════ */
new ResizeObserver(resize).observe(canvas);
resize();
loadWorld();
loadTLEs();
setInterval(loadTLEs,3*3600*1000);   /* TLE 每 3 小时刷新 */
loadCrew();
setInterval(loadCrew,3600*1000);     /* 乘组每小时刷新 */
/* initAOS 已下线 */
tick();
requestAnimationFrame(render);
})();
</script>
</body>
</html>
