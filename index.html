<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空间站实时追踪 · LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#02060f;
  --panel:rgba(8,16,32,.78);
  --panel-2:rgba(14,24,44,.82);
  --line:rgba(120,180,235,.16);
  --line-strong:rgba(140,200,255,.32);
  --text:#eaf3ff;
  --dim:#9bb0d4;
  --iss:#7fd8ff;   /* ISS 海洋蓝青 */
  --tg:#ffb24a;    /* 天宫 太阳橙 */
  --live:#57f7a8;
  --warn:#ffd166;
  --land:#3a6b8a;  /* 真实地球配色:海陆适配 */
  --num:'Rajdhani',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --sans:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  /* 动态基准单位 — JS 监听 resize 把 --u = stage width / 100 px。
     所有页面字号/padding 用 calc(var(--u)*N) 替代 cqw/cqh,
     完全不依赖 container query, OBS 旧 CEF 与浏览器一致渲染。
     9:16 锁定布局下 stage height = stage width * 16/9,
     故 cqh 数值 * 16/9 = 等效 cqw 数值, 统一用 var(--u)。 */
  --u:3.5px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#01030a;
  color:var(--text);
  font-family:var(--sans);
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;
}
/* 竖屏 9:16 舞台:手机上占满,宽屏(OBS/桌面)下按高度居中裁成 9:16 */
#stage{
  width:min(100vw,calc(100dvh * 9 / 16));
  height:100dvh;
  position:relative;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* 星空底 */
#stage::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.7),transparent 100%),
    radial-gradient(1px 1px at 68% 6%,rgba(255,255,255,.5),transparent 100%),
    radial-gradient(1.5px 1.5px at 84% 32%,rgba(180,210,255,.6),transparent 100%),
    radial-gradient(1px 1px at 30% 44%,rgba(255,255,255,.4),transparent 100%),
    radial-gradient(1px 1px at 55% 71%,rgba(255,255,255,.45),transparent 100%),
    radial-gradient(1.5px 1.5px at 8% 82%,rgba(180,210,255,.5),transparent 100%),
    radial-gradient(1px 1px at 91% 88%,rgba(255,255,255,.5),transparent 100%),
    radial-gradient(1px 1px at 42% 92%,rgba(255,255,255,.35),transparent 100%);
}
#stage>*{position:relative;z-index:1}

/* ── 顶栏 ─────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--u)*2.8444) calc(var(--u)*3.4) calc(var(--u)*2.1333);
  border-bottom:1px solid var(--line);
  flex:0 0 auto;
}
.brand{display:flex;align-items:center;gap:calc(var(--u)*2.4)}
.live-dot{
  width:calc(var(--u)*2.6);height:calc(var(--u)*2.6);border-radius:50%;
  background:var(--live);box-shadow:0 0 calc(var(--u)*2) var(--live);
  animation:blink 1.6s ease-in-out infinite;
}
@keyframes blink{50%{opacity:.25}}

/* 自动刷新倒计时角标 — 浮在 stage 右下角, 显示距下次自动 reload 的剩余秒数。
   到 0 时 location.reload() 重新拉取 GitHub Pages 上的最新 index.html。
   默认 10 分钟; URL 参数 ?reload=N 可调 (N 分钟, 0=关闭)。 */
#reload-badge{
  position:absolute;right:calc(var(--u)*2.4);bottom:calc(var(--u)*2.4);
  z-index:10;
  font-family:var(--num);font-weight:600;
  font-size:calc(var(--u)*2.6);line-height:1;
  color:var(--dim);
  background:rgba(2,6,15,.55);
  padding:calc(var(--u)*0.9) calc(var(--u)*1.6);
  border-radius:calc(var(--u)*1.2);
  border:1px solid var(--line);
  letter-spacing:.06em;
  display:flex;align-items:center;gap:calc(var(--u)*1.0);
  user-select:none;pointer-events:none;
  transition:opacity .3s;
}
#reload-badge .lbl{font-size:calc(var(--u)*1.8);opacity:.7}
#reload-badge .num{color:var(--live);font-variant-numeric:tabular-nums;min-width:calc(var(--u)*4.4);text-align:right}
#reload-badge.warn .num{color:var(--warn)}
#reload-badge.imminent .num{color:var(--live);animation:blink 1s ease-in-out infinite}

h1{font-size:calc(var(--u)*4.4);font-weight:700;letter-spacing:.14em}
h1 small{
  display:block;font-family:var(--num);font-weight:600;font-size:calc(var(--u)*2.5);
  letter-spacing:.34em;color:var(--dim);margin-top:calc(var(--u)*0.5333);
}
.clocks{text-align:right;font-family:var(--num);line-height:1.25}
.clocks b{font-size:calc(var(--u)*3.6);font-weight:700;font-variant-numeric:tabular-nums}
.clocks span{font-size:calc(var(--u)*2.4);color:var(--dim);letter-spacing:.12em;margin-right:calc(var(--u)*1.2)}

/* ── 地图 ─────────────────────────── */
#mapWrap{
  position:relative;flex:0 0 auto;
  height:calc(var(--u)*50); /* 等距圆柱 2:1 */
  border-bottom:1px solid var(--line);
  background:#040a1c;
}
#map{position:absolute;inset:0;width:100%;height:100%;display:block}
.map-hud{
  position:absolute;top:calc(var(--u)*1.4);right:calc(var(--u)*1.6);
  background:rgba(4,9,24,.78);
  border:1px solid var(--line);
  border-radius:calc(var(--u)*1.6);
  padding:calc(var(--u)*1.4) calc(var(--u)*2);
  font-family:var(--num);font-size:calc(var(--u)*2.7);font-weight:600;
  font-variant-numeric:tabular-nums;line-height:1.65;
  backdrop-filter:blur(4px);
}
.hud-row{display:flex;align-items:center;gap:calc(var(--u)*1.4);white-space:nowrap}
.hud-row i{width:calc(var(--u)*1.8);height:calc(var(--u)*1.8);border-radius:50%;background:var(--c);box-shadow:0 0 calc(var(--u)*1.4) var(--c)}
.hud-row em{font-style:normal;color:var(--text);min-width:calc(var(--u)*8)}
.hud-row span{color:var(--dim)}
.map-legend{
  position:absolute;left:calc(var(--u)*1.6);bottom:calc(var(--u)*1.4);
  font-size:calc(var(--u)*2.3);color:var(--dim);letter-spacing:.06em;
  background:rgba(4,9,24,.6);border-radius:calc(var(--u)*1.2);padding:calc(var(--u)*0.8) calc(var(--u)*1.6);
}

/* ── 空间站卡片(单卡 ISS + 天宫 分组,填满剩余高度) ── */
#cards{
  flex:1 1 auto;          /* 撑满 stage 剩余空间 */
  min-height:0;
  display:flex;flex-direction:column;gap:calc(var(--u)*2.1333);
  padding:calc(var(--u)*0.7111) calc(var(--u)*2.6);
}
.scard{
  flex:1 1 auto;min-height:0;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:calc(var(--u)*2);
  padding:calc(var(--u)*1.6) calc(var(--u)*2.8);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.scard-head{display:flex;align-items:baseline;gap:calc(var(--u)*2);flex:0 0 auto}
.scard-head h2{font-size:calc(var(--u)*3.4);font-weight:700;letter-spacing:.06em}
.scard-head small{font-family:var(--num);font-weight:600;font-size:calc(var(--u)*2.3);color:var(--dim);letter-spacing:.1em}
.badge{
  margin-left:auto;font-size:calc(var(--u)*2.2);letter-spacing:.2em;
  color:var(--live);border:1px solid var(--live);
  border-radius:99px;padding:calc(var(--u)*0.3556) calc(var(--u)*2);
}
/* ── 分组背景(ISS YouTube 嵌入 / 天宫高清照片) ── */
.crew-block{
  flex:1 1 0;
  min-height:0;
  margin-top:calc(var(--u)*1.6);
  border-top:1px dashed var(--line);
  padding-top:calc(var(--u)*0.8889);
  display:flex;flex-direction:column;
  position:relative;
}
.crew-block:first-of-type{margin-top:calc(var(--u)*1.0667)}
.crew-block-title{
  display:flex;align-items:center;gap:calc(var(--u)*1.2);
  font-family:var(--num);font-weight:700;font-size:calc(var(--u)*2.6);
  letter-spacing:.10em;color:var(--text);
  margin-bottom:calc(var(--u)*0.7111);
  flex:0 0 auto;
  z-index:2;            /* 防止被背景遮挡 */
  text-shadow:0 1px 3px rgba(2,6,15,.8);
}
.crew-block-title i{
  width:calc(var(--u)*1.6);height:calc(var(--u)*1.6);border-radius:50%;background:var(--c);
  box-shadow:0 0 calc(var(--u)*1) var(--c);
}
.crew-block-title em{
  font-style:normal;color:var(--c);
  font-family:var(--num);font-weight:700;font-size:calc(var(--u)*2.6);
  flex-shrink:0;
}
/* 经纬度/高度/速度 meta 文字(在标题里,名字与人数之间) */
.crew-block-meta{
  font-family:var(--num);font-weight:500;font-size:calc(var(--u)*2.1);
  color:var(--dim);letter-spacing:.02em;
  margin:0 calc(var(--u)*0.8) 0 auto;  /* 把 em (人数) 推到最右,自己靠在名称之后 */
  text-shadow:0 1px 2px rgba(2,6,15,.7);
}
/* 背景层 */
.crew-bg{
  flex:1 1 auto;
  min-height:0;
  position:relative;
  border-radius:calc(var(--u)*1.5);
  overflow:hidden;
  background:#000;
}
.crew-bg iframe,
.crew-bg-static{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:0;display:block;
  object-fit:cover;
  z-index:1;
  pointer-events:none;        /* 背景层不接收点击事件,避免误触发 youtube 控制 */
}
.crew-bg-dim{
  position:absolute;inset:0;
  z-index:2;
  /* 半透明黑叠加,确保前景头像/文字看得见 */
  background:linear-gradient(180deg,
    rgba(2,6,15,.55) 0%,
    rgba(2,6,15,.30) 50%,
    rgba(2,6,15,.75) 100%);
  pointer-events:none;
}
/* 前景乘组网格 */
.crew{
  position:relative;
  z-index:3;
  height:100%;
  margin:0;
  padding:calc(var(--u)*0.6);
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(calc(var(--u)*8.5),1fr));
  grid-auto-rows:min-content;
  gap:calc(var(--u)*0.8) calc(var(--u)*0.5);
  align-content:start;   /* 左上对齐 — 头像从左上角依次排列 */
  justify-items:start;   /* 每个 chip 在自己格子里也左对齐 */
  overflow:auto;
  align-self:stretch;
}
.crew::-webkit-scrollbar{display:none}
.crew-loading,.crew-error{
  font-size:calc(var(--u)*2.4);color:#eaf3ff;align-self:center;justify-self:center;
  grid-column:1/-1;
  text-shadow:0 1px 3px rgba(2,6,15,.9);
  background:rgba(2,6,15,.55);padding:calc(var(--u)*0.8889) calc(var(--u)*1.5);border-radius:calc(var(--u)*1.2);
}
.crew-error{color:var(--warn)}
.astro{
  width:100%;text-align:center;min-width:0;
  background:rgba(2,6,15,.18);
  backdrop-filter:blur(1px);
  border-radius:calc(var(--u)*1.2);
  padding:calc(var(--u)*0.4) calc(var(--u)*0.2);
}
.avatar{
  width:calc(var(--u)*6.4);height:calc(var(--u)*6.4);margin:0 auto;border-radius:50%;
  border:1.2px solid var(--c);overflow:hidden;
  background:rgba(255,255,255,.20);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px calc(var(--u)*4) rgba(2,6,15,.5);
}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.avatar .initials{font-family:var(--num);font-weight:700;font-size:calc(var(--u)*2.4);color:var(--c)}
.aname{font-size:calc(var(--u)*1.9);margin-top:calc(var(--u)*0.4444);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;text-shadow:0 1px 2px rgba(2,6,15,.9)}
.adays{font-family:var(--num);font-weight:600;font-size:calc(var(--u)*1.8);color:#e8eefc;margin-top:calc(var(--u)*0.0889);white-space:nowrap;text-shadow:0 1px 2px rgba(2,6,15,.9)}
.stats,.meta-line{display:none !important}   /* 不再使用,统一关闭以便旧样式不影响 */

/* ── 空地通信板块已下线:youtube 现直接嵌入 ISS 卡片背景 ─ */
#comm{display:none !important}
#audioBox,#audioBtn,.ab-bar,.ab-btn,.ab-frame,.ab-tools,.ab-resize,.ab-restore,[id^="ab"]{display:none !important}
/* ── 底部滚动条 ────────────────────── */
#ticker{
  flex:0 0 auto;border-top:1px solid var(--line);
  padding:calc(var(--u)*1.2444) 0;overflow:hidden;white-space:nowrap;
  font-family:var(--num);font-weight:600;font-size:calc(var(--u)*2.5);color:var(--dim);
  letter-spacing:.08em;
}
#ticker .inner{display:inline-block;padding-left:100%;animation:tick 36s linear infinite}
@keyframes tick{to{transform:translateX(-100%)}}
@media (prefers-reduced-motion:reduce){
  #ticker .inner,.live-dot,.dot.on{animation:none}
}
</style>
</head>
<body>
<div id="stage">

  <header>
    <div class="brand">
      <div class="live-dot"></div>
      <h1>空间站实时追踪<small>ORBITAL TRACKER · LIVE</small></h1>
    </div>
    <div class="clocks">
      <div><span>UTC</span><b id="clkUtc">--:--:--</b></div>
      <div><span>北京</span><b id="clkBjt">--:--:--</b></div>
    </div>
  </header>

  <div id="mapWrap">
    <canvas id="map"></canvas>
    <!-- HUD 移除:经纬度/高度/速度 不再在地图上显示,避免遮挡地图。改在卡片标题显示 -->
    <div class="map-legend">━ 轨道预测 90 min · 阴影为夜半球</div>
  </div>

  <div id="cards">
    <section class="scard" id="card-crew" style="--c:var(--iss)">
      <div class="scard-head">
        <h2>在轨乘组 CREW ABOARD</h2><small>ISS · 天宫 CSS · 实时</small>
        <span class="badge">实时</span>
      </div>
      <!-- ISS 分组:背景为本地高清静图 (STS111 ISS 飞越地球弧线剪影) -->
      <div class="crew-block" id="crew-block-iss" style="--c:var(--iss)">
        <div class="crew-block-title">
          <i></i>ISS 国际空间站
          <span class="crew-block-meta" id="crew-iss-meta">定位中…</span>
          <em id="iss-count">--</em>
        </div>
        <div class="crew-bg">
          <img class="crew-bg-static" id="iss-bg-static" alt="ISS over Earth's limb" src="assets/iss-silhouette.jpg">
          <div class="crew-bg-dim"></div>
          <div class="crew" id="iss-crew"><div class="crew-loading">正在获取乘组名单…</div></div>
        </div>
      </div>
      <!-- 天宫分组:背景为天宫高清照片 -->
      <div class="crew-block" id="crew-block-tg" style="--c:var(--tg)">
        <div class="crew-block-title">
          <i></i>天宫 中国空间站
          <span class="crew-block-meta" id="crew-tg-meta">定位中…</span>
          <em id="tg-count">--</em>
        </div>
        <div class="crew-bg">
          <img class="crew-bg-static" id="tg-bg-static" alt="天宫空间站官方高清图" src="assets/tiangong-spacewalk.jpg">
          <div class="crew-bg-dim"></div>
          <div class="crew" id="tg-crew"><div class="crew-loading">正在获取乘组名单…</div></div>
        </div>
      </div>
    </section>
  </div>

  <div id="ticker"><span class="inner" id="tickerText">正在初始化轨道解算引擎…</span></div>

  <!-- 自动刷新倒计时角标 — 到 0 后 location.reload() 拉取 GitHub Pages 最新版本 -->
  <div id="reload-badge" title="距下次自动检查更新">
    <span class="lbl">下次刷新</span>
    <span class="num" id="reloadNum">--:--</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.4/dist/satellite.min.js"></script>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);
const RAD=Math.PI/180;

/* ══ 空间站定义 ══════════════════════════ */
const STATIONS={
  iss:{key:'iss',label:'ISS',cat:25544,color:'#5bd8ff',satrec:null,geo:null,track:[],tleSrc:'',tleAge:0},
  tg :{key:'tg', label:'天宫',cat:48274,color:'#ff7a52',satrec:null,geo:null,track:[],tleSrc:'',tleAge:0}
};
/* 离线兜底 TLE(仅在所有数据源不可达时使用,会标注"离线TLE") */
const FALLBACK_TLE={
  25544:['1 25544U 98067A   26019.50000000  .00016717  00000-0  30000-3 0  9990',
         '2 25544  51.6400 200.0000 0004000  90.0000 270.0000 15.50000000493007'],
  48274:['1 48274U 21035A   26019.50000000  .00020000  00000-0  25000-3 0  9991',
         '2 48274  41.4700 100.0000 0004000  90.0000 270.0000 15.62000000267009']
};

/* ══ TLE 获取(多级数据源) ═══════════════ */
async function jfetch(url,asText){
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok) throw new Error(r.status);
  return asText?r.text():r.json();
}
async function fetchTLE(cat){
  try{
    const t=await jfetch(`https://celestrak.org/NORAD/elements/gp.php?CATNR=${cat}&FORMAT=TLE`,true);
    const L=t.trim().split(/\r?\n/).map(s=>s.trim());
    const i=L.findIndex(s=>s.startsWith('1 '));
    if(i>=0&&L[i+1]) return {l1:L[i],l2:L[i+1],src:'CelesTrak'};
  }catch(e){}
  try{
    const j=await jfetch(`https://tle.ivanstanojevic.me/api/tle/${cat}`);
    if(j.line1) return {l1:j.line1,l2:j.line2,src:'TLE-API'};
  }catch(e){}
  if(cat===25544){
    try{
      const j=await jfetch('https://api.wheretheiss.at/v1/satellites/25544/tles');
      if(j.line1) return {l1:j.line1,l2:j.line2,src:'WhereTheISS'};
    }catch(e){}
  }
  return {l1:FALLBACK_TLE[cat][0],l2:FALLBACK_TLE[cat][1],src:'offline'};
}
async function loadTLEs(){
  await Promise.all(Object.values(STATIONS).map(async st=>{
    const t=await fetchTLE(st.cat);
    try{
      st.satrec=satellite.twoline2satrec(t.l1,t.l2);
      st.tleSrc=t.src;
    }catch(e){console.error('TLE解析失败',st.label,e);}
  }));
  rebuildTracks();
  updateTicker();
}

/* ══ SGP4 解算 ══════════════════════════ */
function geoAt(st,date){
  if(!st.satrec) return null;
  try{
    const pv=satellite.propagate(st.satrec,date);
    if(!pv||!pv.position||typeof pv.position.x!=='number') return null;
    const gmst=satellite.gstime(date);
    const g=satellite.eciToGeodetic(pv.position,gmst);
    const v=pv.velocity?Math.hypot(pv.velocity.x,pv.velocity.y,pv.velocity.z):0;
    return {lat:satellite.degreesLat(g.latitude),lon:satellite.degreesLong(g.longitude),alt:g.height,vel:v};
  }catch(e){return null;}
}
function tleAgeDays(st){
  if(!st.satrec) return 99;
  const nowJd=Date.now()/86400000+2440587.5;
  return nowJd-(st.satrec.jdsatepoch||nowJd);
}
function rebuildTracks(){
  const now=Date.now();
  for(const st of Object.values(STATIONS)){
    const pts=[];
    for(let m=-12;m<=96;m+=1){
      const g=geoAt(st,new Date(now+m*60000));
      if(g) pts.push({lon:g.lon,lat:g.lat,future:m>0});
    }
    st.track=pts;
    st.tleAge=tleAgeDays(st);
  }
}
setInterval(rebuildTracks,20000);

/* ══ 太阳直射点 & 晨昏线 ═════════════════ */
function sunPos(date){
  const n=date/86400000+2440587.5-2451545;
  const L=(280.46+.9856474*n)%360;
  const g=((357.528+.9856003*n)%360)*RAD;
  const lam=(L+1.915*Math.sin(g)+.02*Math.sin(2*g))*RAD;
  const obl=(23.439-4e-7*n)*RAD;
  const dec=Math.asin(Math.sin(obl)*Math.sin(lam));
  const ra=Math.atan2(Math.cos(obl)*Math.sin(lam),Math.cos(lam));
  let gmst=(18.697374558+24.06570982441908*n)%24;
  let lon=ra/RAD-gmst*15;
  lon=((lon+540)%360)-180;
  return {lat:dec/RAD,lon};
}

/* ══ 地图渲染 ═══════════════════════════
   采用真实地球贴图:加载 NASA Blue Marble 等距圆柱投影 PNG,
   支持 CORS 的 CDN 缓存,跨域使用 crossOrigin='anonymous'。
   若贴图加载失败则回退到本文档内绘制的真实风格地图
   (海洋深蓝渐变 + 真实海岸线 GeoJSON 着色 + 极地冰盖 + 经纬网)。 */
const canvas=$('map'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,SC=1,worldGeo=null;   /* SC = CSS 像素基准,绘制相对地图面大小 (DPR 无关) */
const baseCv=document.createElement('canvas'),nightCv=document.createElement('canvas');
const X=lon=>(lon+180)/360*W, Y=lat=>(90-lat)/180*H;

const blueMarble=new Image();
blueMarble.crossOrigin='anonymous';
let bmLoaded=false,bmFailed=false;
blueMarble.onload=()=>{bmLoaded=true;drawBase();};
blueMarble.onerror=()=>{bmFailed=true;drawBase();console.warn('Blue Marble 贴图加载失败,回退到矢量绘制');};
const BM_CANDIDATES=[
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg',
  'https://unpkg.com/three@0.160.0/examples/textures/planets/earth_atmos_2048.jpg',
  'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/earth_atmos_2048.jpg'
];
function tryBM(i){
  if(i>=BM_CANDIDATES.length){bmFailed=true;drawBase();return;}
  blueMarble.src=BM_CANDIDATES[i];
  blueMarble.onerror=()=>tryBM(i+1);
}
tryBM(0);

async function loadWorld(){
  try{
    worldGeo=await jfetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
  }catch(e){console.warn('世界地图数据获取失败,可降级仅有贴图/经纬网',e);}
  drawBase();
}
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=canvas.getBoundingClientRect();
  W=Math.round(r.width*DPR);H=Math.round(r.height*DPR);
  canvas.width=W;canvas.height=H;
  baseCv.width=W;baseCv.height=H;
  nightCv.width=W;nightCv.height=H;
  /* SC = CSS 像素基准 — 取地图宽度的 1/100,这样地图越宽字号/图标越大。
     早期用 max(w,h) 导致 9:16 竖屏 (宽<高) 基准偏小、文字看着小。
     改用 width 让所有相对画面元素在 OBS/浏览器都跟地图宽度等比放大。 */
  SC=r.width/100;          /* 1 SC = 1% 地图 CSS 宽度 */
  /* 同步设置 CSS 全局基准单位 --u (= SC px),替代原 cqw/cqh。
     所有 CSS 字号/padding 用 calc(var(--u)*N) 完全不依赖 container query,
     OBS 旧 CEF 也兼容。设计比例与原 cqw 数值完全一致。 */
  document.documentElement.style.setProperty('--u', SC.toFixed(2)+'px');
  drawBase();drawNight();
}

/* 真实地球底图绘制:
   NASA Blue Marble 贴图作"纹理+颜色细节"用,不覆盖鲜艳底色 —
   先用矢量风格铺一层鲜艳海洋青蓝 + 鲜绿大陆(同回退路径),
   再用 'overlay' 模式叠加贴图(提亮饱和后),贴图只"上色"不改色,
   最后叠加蓝/绿 overlay 高光与边缘晕,最终是 vivid earth 不是暗色贴图。 */
function drawBase(){
  const c=baseCv.getContext('2d');
  c.clearRect(0,0,W,H);
  if(bmLoaded&&blueMarble.width>1){
    /* (1) 先铺鲜艳矢量色底 — 同回退分支,保证贴图加载前后颜色一致 */
    drawVectorBase(c);
    /* (2) 贴图以 overlay 叠加 — 把地表纹理(Topography)染到鲜艳底色上,
       overlay:暗部加深、亮部提亮,原 Blue Marble 的海洋偏暗会被鲜艳蓝底盖过 */
    c.save();
    c.globalCompositeOperation='overlay';
    c.filter='saturate(1.8) brightness(1.25)';
    c.globalAlpha=.8;
    c.drawImage(blueMarble,0,0,W,H);
    c.restore();
    /* (3) 饱和度强叠加再把陆地鲜绿、海洋鲜蓝再推一次,
       'soft-light' 不像 overlay 那么激进,贴图纹理保留 */
    c.save();
    c.globalCompositeOperation='soft-light';
    c.fillStyle='rgba(70,160,225,.18)';
    c.fillRect(0,0,W,H);
    c.fillStyle='rgba(90,200,110,.12)';
    c.fillRect(0,0,W,H);
    c.restore();
    /* (4) 顶层亮度加成:lighter 轻微加色,把整体亮度提上去 */
    c.save();
    c.globalCompositeOperation='lighter';
    c.fillStyle='rgba(20,60,110,.06)';c.fillRect(0,0,W,H);
    c.restore();
    /* (5) 边缘高光蓝晕:上下极地附近带冷色高光 */
    const grd=c.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,'rgba(150,200,255,.16)');
    grd.addColorStop(.5,'rgba(180,255,200,.04)');
    grd.addColorStop(1,'rgba(150,200,255,.16)');
    c.fillStyle=grd;c.fillRect(0,0,W,H);
    c.globalCompositeOperation='source-over';
    drawGrid(c,/*overlay*/true);
    return;
  }
  /* 矢量回退(无贴图或贴图加载中): 更鲜艳的真实海洋青蓝 + 鲜绿大陆 */
  drawVectorBase(c);
}
/* 抽取出来的矢量基色绘制 — 贴图分支与无贴图分支共用同一组鲜艳色,
   保证贴图加载完成前后不会出现颜色跳变(用户原先看到的"一瞬鲜然后变暗") */
function drawVectorBase(c){
  const sea=c.createLinearGradient(0,0,0,H);
  sea.addColorStop(0,'#1d6dbf');    /* 北极近青蓝 */
  sea.addColorStop(.3,'#0c84cd');   /* 高纬海面 */
  sea.addColorStop(.6,'#1098d8');   /* 大洋蓝 */
  sea.addColorStop(.8,'#15a8e0');   /* 赤道海蓝 */
  sea.addColorStop(1,'#1db6e6');    /* 南极近青 */
  c.fillStyle=sea;c.fillRect(0,0,W,H);
  /* 海面再叠一层轻微纹理 */
  c.fillStyle='rgba(150,210,240,.12)';c.fillRect(0,0,W,H);
  drawGrid(c,false);
  drawLand(c);
  if(bmFailed===undefined||bmFailed===false){
    /* 贴图还在加载中,.drawText 提示 */
  }
}
function drawGrid(c,overlay){
  c.strokeStyle=overlay?'rgba(150,190,235,.16)':'rgba(120,170,225,.18)';
  c.lineWidth=1;
  for(let lon=-150;lon<180;lon+=30){
    c.beginPath();c.moveTo(X(lon),0);c.lineTo(X(lon),H);c.stroke();
  }
  for(let lat=-60;lat<90;lat+=30){
    c.beginPath();c.moveTo(0,Y(lat));c.lineTo(W,Y(lat));c.stroke();
  }
  c.strokeStyle='rgba(180,220,255,.36)';
  c.beginPath();c.moveTo(0,Y(0));c.lineTo(W,Y(0));c.stroke(); /* 赤道 */
}
/* 矢量回退:用真实风格着色大陆轮廓(纬度配色) */
function latColor(lat){
  const a=Math.abs(lat);
  if(a>=78)return '#fafffe';
  if(a>=62)return '#e2f0ec';
  if(a>=45)return '#5bcc6a';
  if(a>=30)return '#6ad85a';
  if(a>=15)return '#9ee05a';
  if(a>=10)return '#d0e838';
  return '#ecbf3c';
}
function drawLand(c){
  if(!worldGeo)return;
  const ring=r=>{c.moveTo(X(r[0][0]),Y(r[0][1]));for(let i=1;i<r.length;i++)c.lineTo(X(r[i][0]),Y(r[i][1]));c.closePath();};
  c.lineWidth=Math.max(.8,DPR*.6);
  /* 先用平均纬度给整个国家上色 */
  c.save();
  for(const f of worldGeo.features){
    const g=f.geometry;if(!g)continue;
    let polys=[];
    if(g.type==='Polygon')polys=[g.coordinates];
    else if(g.type==='MultiPolygon')polys=g.coordinates;
    /* 估算平均纬度 */
    let latSum=0,cnt=0;
    for(const p of polys)for(const r of p)for(const pt of r){latSum+=pt[1];cnt++;}
    const latAvg=cnt?latSum/cnt:0;
    c.fillStyle=latColor(latAvg);
    c.strokeStyle='rgba(220,230,245,.45)';
    c.beginPath();
    for(const p of polys)for(const r of p)ring(r);
    c.fill();c.stroke();
  }
  c.restore();
}
function drawNight(){
  const c=nightCv.getContext('2d');
  c.clearRect(0,0,W,H);
  const s=sunPos(new Date());
  const dec=Math.abs(s.lat)<.4?(s.lat<0?-.4:.4):s.lat; /* 避免除零 */
  c.fillStyle='rgba(1,4,16,.52)';
  c.beginPath();
  for(let lon=-180;lon<=180;lon+=2){
    const h=(lon-s.lon)*RAD;
    const lat=Math.atan(-Math.cos(h)/Math.tan(dec*RAD))/RAD;
    lon===-180?c.moveTo(X(lon),Y(lat)):c.lineTo(X(lon),Y(lat));
  }
  const poleY=dec>0?H:0; /* 太阳在北半球 → 夜区伸向南极 */
  c.lineTo(W,poleY);c.lineTo(0,poleY);
  c.closePath();c.fill();
  /* 太阳直射点 */
  const sx=X(s.lon),sy=Y(s.lat);
  const gr=c.createRadialGradient(sx,sy,0,sx,sy,10*DPR);
  gr.addColorStop(0,'rgba(255,225,140,.9)');gr.addColorStop(1,'rgba(255,225,140,0)');
  c.fillStyle=gr;c.beginPath();c.arc(sx,sy,10*DPR,0,7);c.fill();
}
setInterval(drawNight,60000);

/* 轨道线绘制:
   将"过去(future=false)"和"未来(future=true)"分别拆成独立子段,
   每个子段用一条独立 beginPath() 路径,避免 dash 相位在不同子路径
   上跨段累积产生的视觉错位,从而让 ISS/CSS 当前位置前后的实线与
   虚线交接点连续对接。跨子午线 ±180° 的边界天然切分,无需特判。 */
function drawTrack(st){
  if(!st.track||!st.track.length)return;
  /* 预先把轨迹拆成「不跨子午线」的连续片段 */
  const lonSegs=[];let cur=[];let prev=null;
  for(const p of st.track){
    if(prev&&Math.abs(p.lon-prev.lon)>180){
      if(cur.length)lonSegs.push(cur);
      cur=[p];prev=p;continue;
    }
    cur.push(p);prev=p;
  }
  if(cur.length)lonSegs.push(cur);
  /* 再把每个 lonSeg 按 future 拆成精细子段
     关键修复:切换 past→future (或 future→past)时,把切换前一段的最后一点
     复制到新一段的 buf 头部,作为两段的公共连接点。否则 past 最后一点和
     future 第一点不重合,导致线段在切换处断开/错位 —— 这正是用户报告的
     "空间站前面和后面的轨道线对接不上" 的原因。 */
  const paths={past:[],future:[]};
  for(const seg of lonSegs){
    let buf=[];let kind=null;let lastPrev=null;
    for(const p of seg){
      const k=p.future?'future':'past';
      if(kind!==null&&k!==kind){
        if(buf.length>1)paths[kind].push(buf);
        /* 切段时把前段最后一点作为新段第一点,保证 past 末尾 == future 头部 */
        buf=lastPrev?[lastPrev,p]:[p];
        kind=k;
      }else{
        buf.push(p);
      }
      lastPrev=p;kind=k;
    }
    if(buf.length>1)paths[kind].push(buf);
  }
  /* 绘制 past (虚线) */
  ctx.strokeStyle=st.color;
  ctx.globalAlpha=.4;
  ctx.lineWidth=1.0*SC;                                  /* SC 替代 DPR — OBS 内不变细 */
  ctx.setLineDash([3*SC,4*SC]);
  for(const seg of paths.past){
    ctx.beginPath();
    seg.forEach((p,i)=>{const x=X(p.lon),y=Y(p.lat);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
  }
  /* 绘制 future (实线) */
  ctx.globalAlpha=.9;
  ctx.lineWidth=1.4*SC;                                  /* SC 替代 DPR */
  ctx.setLineDash([]);
  for(const seg of paths.future){
    ctx.beginPath();
    seg.forEach((p,i)=>{const x=X(p.lon),y=Y(p.lat);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
  }
  ctx.setLineDash([]);ctx.globalAlpha=1;
}
/* 空间站标志符号:真实外形,以 (x,y) 为中心绘制定向正视图。
   s 是基准单位(像素),与速度方向无关。drawMarker 调用时传放大后 s 值。
   ISS:长桁架 + 中央加压舱(6 舱段) + 4 对矩形太阳能板 + 散热板
   天宫 CSS:T 字核心舱 + 左右实验舱 + 顶部对接舱 + 4 大对日太阳能翼 */
function stationIcon(st,x,y,scale){
  const s=scale;          /* drawMarker 已乘过 SC,此处不再加 DPR — DPR 无关化 */
  ctx.save();
  ctx.translate(x,y);
  if(st.key==='iss'){
    /* ISS 真实外形 (顶视,桁架水平方向):
       长桁架主梁 + 中央加压舱(串联 6 舱段) + 4 对大型矩形太阳能板 + 散热板(青色) */
    /* 桁架主梁 — 更长更细 */
    ctx.fillStyle='#c8d2dc';
    ctx.fillRect(-3.6*s,-0.22*s,7.2*s,0.44*s);
    /* 中央加压舱 — 长条圆柱,中央有节点 */
    ctx.fillStyle='#e6edf4';
    ctx.fillRect(-1.1*s,-0.55*s,2.2*s,1.1*s);
    ctx.strokeStyle='#a3b1bf';ctx.lineWidth=0.08*s;
    ctx.strokeRect(-1.1*s,-0.55*s,2.2*s,1.1*s);
    /* 4 对大型太阳能板 — 桁架两侧各 4 块,上下对称 */
    ctx.fillStyle='#1c2b4a';
    for(const ox of [-3.0,-2.0,2.0,3.0]){
      const px=ox*s;
      /* 上翼 */
      ctx.fillRect(px-0.42*s,-2.6*s,0.84*s,1.85*s);
      /* 下翼 */
      ctx.fillRect(px-0.42*s, 0.75*s,0.84*s,1.85*s);
      /* 翼中央杆(纵向) */
      ctx.fillStyle='#465d86';
      ctx.fillRect(px-0.05*s,-2.6*s,0.1*s,3.7*s);
      /* 横向格栅线 — 增加真实感 */
      ctx.strokeStyle='#324363';ctx.lineWidth=0.04*s;
      for(let yy=-2.2;yy<2.2;yy+=0.32){
        ctx.beginPath();
        ctx.moveTo(px-0.42*s,yy*s);ctx.lineTo(px+0.42*s,yy*s);
        ctx.stroke();
      }
      ctx.fillStyle='#1c2b4a';
    }
    /* 散热板(青色横条) — 桁架中央上下方 */
    ctx.fillStyle='#7fd8ff';ctx.globalAlpha=.85;
    ctx.fillRect(-3.6*s,-0.1*s,7.2*s,0.2*s);
    ctx.globalAlpha=1;
  }else if(st.key==='tg'){
    /* 天宫 CSS 真实外形 (顶视,T 字布局):
       水平主梁两端各 2 对大太阳能翼 · 中央三角核心舱 · 末端对接舱/飞船 */
    /* 主水平梁 */
    ctx.fillStyle='#c2cbd4';
    ctx.fillRect(-2.4*s,-0.18*s,4.8*s,0.36*s);
    /* 核心舱(天和) — 中央圆柱 */
    ctx.fillStyle='#e6edf3';
    ctx.fillRect(-0.5*s,-0.5*s,1.0*s,1.0*s);
    ctx.strokeStyle='#a3b1bf';ctx.lineWidth=0.06*s;
    ctx.strokeRect(-0.5*s,-0.5*s,1.0*s,1.0*s);
    /* 问天、梦天实验舱 — 核心舱左右两侧 */
    ctx.fillStyle='#cbd3dc';
    ctx.fillRect(-1.85*s,-0.32*s,1.05*s,0.64*s);
    ctx.fillRect( 0.8 *s,-0.32*s,1.05*s,0.64*s);
    /* 顶部对接舱 — 待对接飞船位置 */
    ctx.fillStyle='#a9b4be';
    ctx.fillRect(-0.18*s,-1.25*s,0.36*s,0.7*s);
    /* 4 对大型太阳能翼 — 左右两端各 2 对(4 翼) */
    ctx.fillStyle='#22365b';
    for(const ox of [-2.0,-1.3,1.3,2.0]){
      const px=ox*s;
      ctx.fillRect(px-0.42*s,-2.7*s,0.84*s,1.6*s);
      ctx.fillRect(px-0.42*s, 1.1*s,0.84*s,1.6*s);
      /* 中央杆 */
      ctx.fillStyle='#43598a';
      ctx.fillRect(px-0.05*s,-2.7*s,0.1*s,3.7*s);
      /* 横向格栅线 */
      ctx.strokeStyle='#34466f';ctx.lineWidth=0.04*s;
      for(let yy=-2.3;yy<2.3;yy+=0.3){
        ctx.beginPath();
        ctx.moveTo(px-0.42*s,yy*s);ctx.lineTo(px+0.42*s,yy*s);
        ctx.stroke();
      }
      ctx.fillStyle='#22365b';
    }
  }
  ctx.restore();
}

function drawMarker(st,t){
  if(!st.geo)return;
  const x=X(st.geo.lon),y=Y(st.geo.lat);
  const p=(t%2200)/2200;
  /* 脉冲圈 — DPR 无关化,用 SC 等比放大 */
  ctx.strokeStyle=st.color;ctx.globalAlpha=(1-p)*.55;
  ctx.lineWidth=2.4*SC;
  ctx.beginPath();ctx.arc(x,y,(6+18*p)*SC,0,7);ctx.stroke();
  ctx.globalAlpha=1;
  /* 投影 glow — 阴影大小也用 SC */
  ctx.shadowColor=st.color;ctx.shadowBlur=9*SC;
  /* 真实外形 — 图标 scale 用 SC,放大让 OBS 观众也明显可见 */
  stationIcon(st,x,y,Math.max(1.8,1.8*SC));
  ctx.shadowBlur=0;
  /* 高亮中心白点便于视觉锁定 */
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x,y,1.6*SC,0,7);ctx.fill();
}

/* 文字标签布局: 两站过近时强制 ISS 在上/CSS 在下错位, 文字直接贴图标, 无描边背景。
   由 render() 先算好两站坐标再画, 解决重叠覆盖问题。 */
function placeLabels(iy, ty){
  /* iy/ty: {st, x, y} ISS 与 天宫 的屏幕坐标 */
  const layout = [];
  for(const it of [iy, ty]){
    const st = it.st, x = it.x, y = it.y;
    if(!st.geo) { layout.push(null); continue; }
    const txt=`${st.label} · ${Math.round(st.geo.alt)}km · ${st.geo.vel.toFixed(2)}km/s`;
    const fontPx=Math.max(14, 3.0*SC);
    ctx.font=`700 ${fontPx}px Rajdhani,sans-serif`;
    const tw=ctx.measureText(txt).width;
    layout.push({st, x, y, txt, fontPx, tw});
  }
  const issP = layout[0], tgP = layout[1];
  if(issP && tgP){
    const dx = issP.x - tgP.x, dy = issP.y - tgP.y;
    const too_close = Math.abs(dx) < Math.max(issP.tw, tgP.tw) + 8*SC && Math.abs(dy) < (issP.fontPx + tgP.fontPx)*1.4;
    if(too_close){
      /* 强制 ISS 文字往上,CSS 文字往下 (完成错位) */
      issP.ly = issP.y - issP.fontPx*1.4 - 2*SC;
      tgP.ly  = tgP.y  + tgP.fontPx*1.6 + 2*SC;
      /* 水平依然沿用原本 ISS 右/CSS 左 */
      issP.lx = issP.x + 4*SC;
      tgP.lx  = tgP.x  - 4*SC - tgP.tw;
      /* 边缘翻转 */
      if(issP.lx + issP.tw > W - 2*SC) issP.lx = issP.x - 4*SC - issP.tw;
      if(tgP.lx < 2*SC) tgP.lx = tgP.x + 4*SC;
      if(issP.ly < issP.fontPx) issP.ly = issP.y + issP.fontPx*1.1;
      if(tgP.ly > H - 2*SC) tgP.ly = tgP.y - tgP.fontPx*0.35;
    } else {
      /* 不近 — 默认 ISS 右上 / CSS 左下 */
      issP.lx = issP.x + 4*SC;
      issP.ly = issP.y - issP.fontPx*0.35;
      tgP.lx  = tgP.x  - 4*SC - tgP.tw;
      tgP.ly  = tgP.y  + tgP.fontPx*1.1;
      if(issP.lx + issP.tw > W - 2*SC) issP.lx = issP.x - 4*SC - issP.tw;
      if(tgP.lx < 2*SC) tgP.lx = tgP.x + 4*SC;
      if(issP.ly < issP.fontPx) issP.ly = issP.y + issP.fontPx*1.1;
      if(tgP.ly > H - 2*SC) tgP.ly = tgP.y - tgP.fontPx*0.35;
    }
  } else {
    /* 只有一站可见: 简单贴右侧 */
    for(const p of layout){
      if(!p) continue;
      p.lx = p.x + 4*SC;
      p.ly = p.y - p.fontPx*0.35;
      if(p.lx + p.tw > W - 2*SC) p.lx = p.x - 4*SC - p.tw;
      if(p.ly < p.fontPx) p.ly = p.y + p.fontPx*1.1;
      if(p.ly > H - 2*SC) p.ly = p.y - p.fontPx*0.35;
    }
  }
  return layout;
}

function drawText(p){
  if(!p) return;
  ctx.shadowColor='rgba(2,6,15,.72)';ctx.shadowBlur=2*SC;ctx.shadowOffsetY=0.5*SC;
  ctx.fillStyle=p.st.color;
  ctx.fillText(p.txt, p.lx, p.ly);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
}
function render(t){
  try{
    if(W>0&&baseCv.width>0){
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(baseCv,0,0);
      ctx.drawImage(nightCv,0,0);
      drawTrack(STATIONS.iss);drawTrack(STATIONS.tg);
      drawMarker(STATIONS.iss,t||0);drawMarker(STATIONS.tg,t||0);
      /* 文字标签 — placeLabels 一次性算两站坐标防重叠, drawText 实际绘制 (无描边背景) */
      const ix = STATIONS.iss.geo?X(STATIONS.iss.geo.lon):0, iy2 = STATIONS.iss.geo?Y(STATIONS.iss.geo.lat):0;
      const tx = STATIONS.tg.geo?X(STATIONS.tg.geo.lon):0,  ty2 = STATIONS.tg.geo?Y(STATIONS.tg.geo.lat):0;
      const labels = placeLabels({st:STATIONS.iss,x:ix,y:iy2}, {st:STATIONS.tg,x:tx,y:ty2});
      for(const p of labels) drawText(p);
    }
  }catch(e){
    if(!render.err){render.err=1;console.error('渲染异常',e);}
  }
  requestAnimationFrame(render);
}

/* ══ 数据面板刷新 ═══════════════════════ */
const fmtLat=v=>`${Math.abs(v).toFixed(2)}°${v>=0?'N':'S'}`;
const fmtLon=v=>`${Math.abs(v).toFixed(2)}°${v>=0?'E':'W'}`;
function tick(){
  const now=new Date();
  $('clkUtc').textContent=now.toISOString().slice(11,19);

    if(meta)meta.textContent=`${fmtLat(g.lat)} ${fmtLon(g.lon)} · ${Math.round(g.alt)}km · ${g.vel.toFixed(2)}km/s`;
  }
  /* 每秒检查空间站昼夜状态,变化时切对应背景图 */
  updateCrewBg('crew-block-iss','iss',ISS_BG,ISS_BG_FALLBACK);
  updateCrewBg('crew-block-tg', 'tg', TG_BG,  TG_BG_FALLBACK);
}
setInterval(tick,1000);

/* ══ 乘组信息 ═══════════════════════════ */
const CN_NAMES={
  'Chen Dong':'陈冬','Chen Zhongrui':'陈中瑞','Wang Jie':'王杰',
  'Cai Xuzhe':'蔡旭哲','Song Lingdong':'宋令东','Wang Haoze':'王浩泽',
  'Zhang Lu':'张陆','Wu Fei':'武飞','Zhang Hongzhang':'张洪章',
  'Jing Haipeng':'景海鹏','Zhu Yangzhu':'朱杨柱','Gui Haichao':'桂海潮',
  'Tang Hongbo':'汤洪波','Tang Shengjie':'唐胜杰','Jiang Xinlin':'江新林',
  'Ye Guangfu':'叶光富','Li Cong':'李聪','Li Guangsu':'李广苏',
  'Liu Yang':'刘洋','Wang Yaping':'王亚平','Zhai Zhigang':'翟志刚',
  'Nie Haisheng':'聂海胜','Liu Boming':'刘伯明','Fei Junlong':'费俊龙',
  'Deng Qingming':'邓清明','Yang Hongbo':'杨宏波'
};
const flagEmoji=cc=>cc&&cc.length===2?String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))):'';
function daysInSpace(p){
  let t=p.launched;
  if(typeof t==='number'&&t>1e9)t*=1000;
  else if(typeof t==='string')t=Date.parse(t);
  if(t&&isFinite(t)&&t>0)return Math.max(0,Math.floor((Date.now()-t)/86400000));
  if(typeof p.days_in_space==='number')return p.days_in_space;
  return null;
}
function crewChip(p){
  const el=document.createElement('div');el.className='astro';
  const cn=CN_NAMES[p.name];
  const days=daysInSpace(p);
  const initials=(p.name||'?').split(/\s+/).map(s=>s[0]).slice(0,2).join('').toUpperCase();
  el.innerHTML=`
    <div class="avatar"><span class="initials">${initials}</span></div>
    <div class="aname" title="${p.name}${p.spacecraft?' · '+p.spacecraft:''}${p.position?' · '+p.position:''}">${cn||p.name} ${flagEmoji(p.flag_code)}</div>
    <div class="adays">${days!=null?'在轨 '+days+' 天':(p.agency||'')}</div>`;
  if(p.image){
    const img=new Image();
    img.referrerPolicy='no-referrer';img.alt=p.name;
    img.onload=()=>{const av=el.querySelector('.avatar');av.innerHTML='';av.appendChild(img);};
    img.onerror=()=>{if(img.src!==p.image){img.src=p.image;}}; /* 缩略图失败则回退原图 */
    img.src=thumbURL(p.image);
  }
  return el;
}
/* 维基共享资源原图动辄数 MB,转成 240px 缩略图 */
function thumbURL(u){
  const m=/^https:\/\/upload\.wikimedia\.org\/wikipedia\/commons\/([0-9a-f])\/([0-9a-f]{2})\/([^/]+)$/i.exec(u||'');
  return m?`https://upload.wikimedia.org/wikipedia/commons/thumb/${m[1]}/${m[2]}/${m[3]}/240px-${m[3]}`:u;
}
function renderCrew(listId,people){
  const box=$(listId);box.innerHTML='';
  /* 更新计数器 */
  const cnt=$(listId.replace('crew','count'));
  if(cnt)cnt.textContent=people.length+'人';
  if(!people.length){box.innerHTML='<div class="crew-error">暂无乘组数据</div>';return;}
  people.forEach(p=>box.appendChild(crewChip(p)));
}
/* 乘组已多行显示,不再需要自动横滚 */
async function loadCrew(){
  const sources=[
    'https://raw.githubusercontent.com/corquaid/international-space-station-APIs/main/JSON/people-in-space.json',
    'https://corquaid.github.io/international-space-station-APIs/JSON/people-in-space.json'
  ];
  let data=null;
  for(const u of sources){try{data=await jfetch(u);break;}catch(e){}}
  if(!data){ /* 最后兜底:open-notify(仅姓名) */
    try{
      const j=await jfetch('http://api.open-notify.org/astros.json');
      data={people:j.people.map(p=>({name:p.name,spacecraft:p.craft}))};
    }catch(e){}
  }
  if(!data||!Array.isArray(data.people)){
    $('iss-crew').innerHTML=$('tg-crew').innerHTML='<div class="crew-error">乘组数据源不可达</div>';
    return;
  }
  /* corquaid 源用 iss 布尔字段标记归属;open-notify 兜底源用 craft 名称 */
  const craft=p=>String(p.spacecraft||p.location||'').toLowerCase();
  const isTG=p=>p.iss===false||/tiangong|css|tianhe|shenzhou/.test(craft(p));
  const isISS=p=>!isTG(p)&&(p.iss===true||/\biss\b|dragon|soyuz|starliner/.test(craft(p)));
  renderCrew('iss-crew',data.people.filter(isISS));
  renderCrew('tg-crew',data.people.filter(isTG));
}

/* ══ 卡片背景本地高清静图 ──
   ISS / 天宫 卡片都使用 assets/ 目录下的本地高清 jpg 作为背景,
   规避了所有视频流问题：
   - YouTube embed 错误 153 (NASA 禁止嵌入)
   - UStream/IBM Video bot detection
   - NASA akamaized HLS 端点全部下线
   - Wikimedia 防盗链/CORS

   ISS 图(NASA STS111):  国际空间站飞越地球弧线剪影,空间站本体完整可见
   天宫图(中国载人航天): 神舟十五号出舱作业,空间站本体与地球背景

   两图均加 onError 备援逻辑,主图挂了自动切换到备援,备援挂了停留显示。 */

/* ISS 本地静图 — 按空间站当前所处昼夜状态切换:
   白天  -> iss-zenith.jpg       (STS098 Zenith view, 太空亮色俯瞰 ISS)
   黑夜  -> iss-night.jpg        (Expedition 72 城市灯+极光+大气辉光)
   晨昏  -> iss-terminator.jpg   (Moon over Earth limb, 空间站晨昏带)
   主备援: iss-silhouette.jpg    (STS111 剪影 — 任何状态图加载失败时兜底) */
const ISS_BG={day:'assets/iss-zenith.jpg',night:'assets/iss-night.jpg',dusk:'assets/iss-terminator.jpg'};
const ISS_BG_FALLBACK='assets/iss-silhouette.jpg';
/* 天宫本地静图 — 按昼夜状态切换:
   白天  -> tiangong-spacewalk.jpg (神舟十五号出舱作业, 已有)
   黑夜  -> iss-night.jpg          (ISS 轨道夜景, 代表近地轨道黑夜视觉, 与 ISS 共享)
   晨昏  -> tg-terminator.jpg      (Expedition 74 ISS 进入中国日落, 空间站日落轨道)
   主备援: tiangong-rear.jpg       (天宫后视, 已有) */
const TG_BG ={day:'assets/tiangong-spacewalk.jpg',night:'assets/iss-night.jpg',dusk:'assets/tg-terminator.jpg'};
const TG_BG_FALLBACK='assets/tiangong-rear.jpg';

/* 判定空间站当前所处昼夜状态:
   根据空间站当前经纬度(lat,lon)与太阳直射点(sunLat,sunLon)的球面夹角,
   z < 75°  -> 白天 (空间站位于太阳直射点 75° 球面距离内,昼半球中央)
   z > 105° -> 黑夜 (空间站位于夜半球中央)
   中间     -> 晨昏 (75°-105° 之间, 接近晨昏线)
   边界缓冲 5° 避免状态在临界点反复横跳导致图片闪烁切换。 */
function dayNightPhase(lat,lon,sun){
  /* 球面两点夹角(zenith angle) 公式: cos z = sin a sin b + cos a cos b cos Δλ */
  const dz=(lat-sun.lat)*Math.PI/180;
  const dl=(lon-sun.lon)*Math.PI/180;
  const cz=Math.sin(lat*Math.PI/180)*Math.sin(sun.lat*Math.PI/180)+
            Math.cos(lat*Math.PI/180)*Math.cos(sun.lat*Math.PI/180)*Math.cos(dl);
  const z=Math.acos(Math.max(-1,Math.min(1,cz)))*180/Math.PI;
  if(z<75) return 'day';
  if(z>105) return 'night';
  return 'dusk';
}

/* 启动 ISS / 天宫 卡片背景静态图(主图 + 备援级联)。
   改为三套图按昼夜状态动态切换 — 当空间站从白天移到黑夜时,
   背景图平滑切到对应状态图; 每张状态图都有自己的备援兜底。 */
const crewBgState={};   /* {iss:{phase:prevUrl,tried:[]}, tg:{...}} */
function setCrewBg(blockId, url, fallback){
  const img=document.querySelector(`#${blockId} .crew-bg-static`);
  if(!img)return;
  if(img.dataset.cur===url && img.dataset.loaded==='1') return;  /* 同图不必重设 */
  img.dataset.cur=url;
  img.dataset.loaded='0';
  img.onerror=()=>{
    if(img.dataset.fallback==='1'){return;}
    img.dataset.fallback='1';
    img.dataset.loaded='1';
    img.src=fallback;
  };
  img.onload=()=>{img.dataset.loaded='1';img.dataset.fallback='0';};
  img.src=url;
}
/* 每次解算位置时调用:根据 st.lat/st.lon 与 sun 决定 phase,
   若 phase 变化则切到对应三状态图(始终带各自备援) */
function updateCrewBg(blockId, stationId, bgSet, bgFallback){
  const st=STATIONS[stationId];
  if(!st || typeof st.lat!=='number' || typeof st.lon!=='number')return;
  const sun=sunPos(new Date());
  const phase=dayNightPhase(st.lat,st.lon,sun);
  const prev=crewBgState[blockId];
  if(prev && prev.phase===phase)return;   /* 同状态不切换 */
  crewBgState[blockId]={phase};
  setCrewBg(blockId, bgSet[phase]||bgSet.day, bgFallback);
}

/* ══ 底部滚动条 ═════════════════════════ */
function updateTicker(){
  const s=STATIONS;
  $('tickerText').textContent=
    `数据源:CelesTrak TLE(ISS ${s.iss.tleSrc||'…'} / 天宫 ${s.tg.tleSrc||'…'})· 位置由 SGP4 模型逐秒实时解算 · `+
    `乘组数据:Open Notify / corquaid People-in-Space API · 背景:NASA STS111 / 中国载人航天工程 公开高清图 · `+
    `本页面为公开数据聚合展示,非官方产品 ─── `;
}

/* ══ 启动 ═══════════════════════════════ */
new ResizeObserver(resize).observe(canvas);
resize();
loadWorld();
loadTLEs();

loadCrew();
setInterval(loadCrew,3600*1000);     /* 乘组每小时刷新 */
/* 加载 ISS / 天宫 卡片本地高清背景图 — 首次用 day 状态,
   之后 updateCrewBg 在 tick 中根据空间站昼夜状态动态切换 */
setCrewBg('crew-block-iss', ISS_BG.day, ISS_BG_FALLBACK);
setCrewBg('crew-block-tg',  TG_BG.day,  TG_BG_FALLBACK);
/* initAOS 已下线 */

/* 自动刷新倒计时 — 默认 10 分钟检查一次 GitHub Pages 上是否有新版 index.html。
   URL 参数 ?reload=N 可调 (N 分钟, 0=关闭)。到 0 自动 location.reload()。
   仅做整页 reload — 静态图/位置数据本来已经每秒在跑, 这里只是为了拿到我新推的代码改动。 */
(function setupAutoReload(){
  try{
    const m = new URL(location.href).searchParams.get('reload');
    const minutes = m===null ? 10 : parseFloat(m);
    const el = document.getElementById('reload-badge');
    const num = document.getElementById('reloadNum');
    if(!el || !num){ return; }
    if(!isFinite(minutes) || minutes<=0){
      el.style.display='none';                       /* 关闭时隐藏角标 */
      return;
    }
    let remain = Math.max(10, Math.round(minutes*60));   /* 秒, 至少 10s */
    const fmt = s => {
      const mm = String(Math.floor(s/60)).padStart(2,'0');
      const ss = String(s%60).padStart(2,'0');
      return `${mm}:${ss}`;
    };
    const tick = () => {
      num.textContent = fmt(remain);
      el.classList.toggle('warn', remain<=60 && remain>15);
      el.classList.toggle('imminent', remain<=15);
      if(remain<=0){
        num.textContent = '00:00';
        try{ location.reload(); }catch(e){ /* reload 被拦截时静默等下次 */ }
        return;
      }
      remain--;
      setTimeout(tick, 1000);
    };
    tick();
  }catch(e){ /* 静默失败 — 不影响主追踪功能 */ }
})();

tick();
requestAnimationFrame(render);
})();
</script>
